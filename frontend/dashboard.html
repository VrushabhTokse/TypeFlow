<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TypeFlow - Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="background-elements">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <nav class="navbar">
        <div class="logo">
            <i class="fa-solid fa-keyboard"></i>
            <span>TypeFlow</span>
        </div>
        <div class="nav-links">
            <a href="index.html"><i class="fa-solid fa-play"></i> Practice</a>
            <a href="dashboard.html" class="active"><i class="fa-solid fa-chart-line"></i> Dashboard</a>
            <button class="btn secondary-btn small-btn" id="logout-btn">Logout</button>
            <button class="theme-toggle" id="theme-toggle">
                <i class="fa-solid fa-moon"></i>
            </button>
        </div>
    </nav>

    <main class="container dashboard-container">
        <header class="dashboard-header">
            <h1>Welcome back, <span id="username-display">User</span>!</h1>
            <p>Track your typing progress and statistics.</p>
        </header>

        <div class="stats-grid">
            <div class="stat-card glass-panel">
                <div class="stat-icon"><i class="fa-solid fa-fire"></i></div>
                <div class="stat-details">
                    <h3>Highest WPM</h3>
                    <div class="stat-val" id="highest-wpm">0</div>
                </div>
            </div>
            <div class="stat-card glass-panel">
                <div class="stat-icon"><i class="fa-solid fa-bolt"></i></div>
                <div class="stat-details">
                    <h3>Average WPM</h3>
                    <div class="stat-val" id="avg-wpm">0</div>
                </div>
            </div>
            <div class="stat-card glass-panel">
                <div class="stat-icon"><i class="fa-solid fa-clipboard-check"></i></div>
                <div class="stat-details">
                    <h3>Total Tests</h3>
                    <div class="stat-val" id="total-tests">0</div>
                </div>
            </div>
        </div>

        <section class="history-section glass-panel">
            <h2>Recent Test History</h2>
            <div class="table-responsive">
                <table class="history-table">
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Level</th>
                            <th>Duration</th>
                            <th>WPM</th>
                            <th>Accuracy</th>
                            <th>Errors</th>
                        </tr>
                    </thead>
                    <tbody id="history-body">
                        <!-- Populated by JS -->
                        <tr><td colspan="6" class="text-center loading-text">Loading history...</td></tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <footer class="app-footer">
        <p>Created by T21</p>
    </footer>

    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
    <script src="js/dashboard.js"></script>
</body>
</html>
